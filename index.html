<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מחשבון מזון המשלחות בצופים</title>
    <style>
        :root {
            --primary: #0A3469;
            --primary-light: #E1F0FF;
            --secondary: #4A5568;
            --accent: #FFC107;
            --bg: #F7FAFC;
            --panel: #FFFFFF;
            --text-main: #2D3748;
            --text-muted: #718096;
            --success: #25D366;
            --danger: #E53E3E;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; }
        
        /* Responsive Foundation */
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

        /* Login Screen - Covers everything */
        #loginScreen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            z-index: 10000; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, var(--primary) 0%, #1a4a8e 100%); padding: 20px;
        }
        .login-card { 
            background: white; padding: 40px 30px; border-radius: var(--radius-lg); 
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }
        .login-card input { width: 100%; padding: 15px; margin: 15px 0; border-radius: var(--radius-md); border: 2px solid #E2E8F0; text-align: center; font-size: 1.1rem; }

        /* App Content - Hidden by default */
        #appContent { display: none; flex-direction: column; height: 100%; }

        /* Header Layout */
        header { 
            background: var(--panel); padding: 10px 20px; display: flex; align-items: center; 
            justify-content: space-between; box-shadow: var(--shadow); border-bottom: 4px solid var(--primary); flex-shrink: 0;
        }
        .logo-container img { height: 75px; width: auto; }
        
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .pax-inputs { display: flex; gap: 8px; background: #F8FAFC; padding: 8px; border-radius: var(--radius-md); border: 1px solid #E2E8F0; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        .input-group label { font-size: 10px; font-weight: 800; color: var(--secondary); margin-bottom: 2px; }
        .input-group input { width: 55px; padding: 5px; border-radius: 6px; border: 1px solid #CBD5E0; text-align: center; font-weight: bold; font-size: 13px; }
        #paxTotal { width: 70px; background: var(--primary-light); color: var(--primary); }

        /* Main Panel Layout */
        main { display: grid; grid-template-columns: 350px 1fr 380px; flex-grow: 1; overflow: hidden; gap: 15px; padding: 15px; }
        .panel { background: var(--panel); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #E2E8F0; }
        .panel-header { padding: 15px; border-bottom: 1px solid #EDF2F7; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { margin: 0; font-size: 1.1rem; color: var(--primary); font-weight: 800; }
        .panel-content { flex-grow: 1; overflow-y: auto; padding: 15px; }

        /* Mobile Viewport Overrides */
        @media (max-width: 1100px) {
            html, body { overflow: auto; }
            #appContent { height: auto; }
            main { grid-template-columns: 1fr; overflow: visible; padding: 10px; }
            .panel { height: 600px; margin-bottom: 15px; }
            header { flex-direction: column; height: auto; padding: 15px; gap: 15px; }
            .header-controls { flex-direction: column; width: 100%; }
            .pax-inputs { width: 100%; justify-content: space-around; }
        }

        /* Reusable Components */
        .btn { padding: 10px 16px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #EDF2F7; color: var(--secondary); }
        .btn-danger { background: #FFF5F5; color: var(--danger); }
        .btn-success { background: var(--success); color: white; width: 100%; padding: 18px; font-size: 1.1rem; justify-content: center; }

        .card { background: white; border-radius: var(--radius-md); border: 1px solid #E2E8F0; margin-bottom: 12px; transition: var(--transition); position: relative; }
        .recipe-card { padding: 15px; cursor: pointer; border-right: 5px solid #CBD5E0; }
        .recipe-card.mine { border-right-color: var(--primary); }
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #EDF2F7; font-weight: bold; }
        .meal-card-header { background: #F8FAFC; padding: 12px 15px; font-weight: 800; display: flex; justify-content: space-between; border-bottom: 1px solid #EDF2F7; }

        /* Multi-select Diet Styles */
        .diet-multi { display: flex; flex-wrap: wrap; gap: 4px; }
        .diet-opt { font-size: 10px; display: flex; align-items: center; gap: 2px; background: #fff; border: 1px solid #CBD5E0; padding: 4px 6px; border-radius: 6px; cursor: pointer; }
        .diet-opt input { display: none; }
        .diet-opt:has(input:checked) { background: var(--primary); color: white; border-color: var(--primary); }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 9000; padding: 20px; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        .ing-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; padding: 15px; background: #f8fafc; border-radius: var(--radius-md); border: 1px solid #eee; }
        @media (min-width: 800px) { .ing-row { grid-template-columns: 1.5fr 0.6fr 0.8fr 1fr 2.5fr 45px; } .modal { padding: 40px; } }
        .ing-row input, .ing-row select { padding: 8px; border: 1px solid #CBD5E0; border-radius: 8px; font-size: 13px; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2D3748; color: white; padding: 12px 30px; border-radius: 50px; z-index: 11000; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast">הרשימה הועתקה לוואטסאפ! ✅</div>

<div id="loginScreen">
    <div class="login-card">
        <img src="משלחות קיץ צבעוני.png" style="width: 180px; margin-bottom: 20px;">
        <h2 style="color:var(--primary); margin:0;">כניסת משלחת</h2>
        <input type="text" id="usernameInput" placeholder="שם משתמש (admin)" onkeypress="if(event.key==='Enter') login()">
        <button class="btn btn-primary" onclick="login()" style="width:100%; justify-content:center; padding:15px; font-size:1.1rem;">התחברות</button>
    </div>
</div>

<div id="appContent">
    <header>
        <div class="logo-container"><img src="משלחות קיץ צבעוני.png"></div>
        <div class="header-controls">
            <div class="pax-inputs">
                <div class="input-group"><label>חניכים</label><input type="number" id="paxTotal" value="100" oninput="calc()"></div>
                <div class="input-group"><label>טבעוני 🥬</label><input type="number" id="paxVegan" value="0" oninput="calc()"></div>
                <div class="input-group"><label>צמחוני 🥦</label><input type="number" id="paxVeg" value="0" oninput="calc()"></div>
                <div class="input-group"><label>גלוטן 🌾</label><input type="number" id="paxGF" value="0" oninput="calc()"></div>
                <div class="input-group"><label>לקטוז 🥛</label><input type="number" id="paxLac" value="0" oninput="calc()"></div>
            </div>
            <div id="userDisplay" style="font-weight:bold; font-size:14px; color:var(--primary)"></div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" onclick="logout()">התנתקות</button>
                <button id="adminBtn" class="btn btn-primary" style="display:none;" onclick="openAdminModal()">⚙️</button>
            </div>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="panel-header"><h3>מאגר מתכונים</h3><button class="btn btn-primary" onclick="openRecipeModal()">+ חדש</button></div>
            <div class="panel-content">
                <input type="text" id="libSearch" style="width:100%; padding:12px; border-radius:var(--radius-md); border:1px solid #E2E8F0; margin-bottom:15px;" placeholder="חפש מתכון..." oninput="renderLib()">
                <div style="font-weight:bold; color:var(--text-muted); font-size:12px; margin-bottom:10px;">⭐ המתכונים שלי</div>
                <div id="myRecipesContainer"></div>
                <div style="cursor:pointer; background:#F8FAFC; padding:12px; border-radius:var(--radius-md); display:flex; justify-content:space-between; margin-top:20px; font-weight:bold; color:var(--primary);" onclick="toggleOtherLibrary()">
                    <span>🌍 מתכוני משלחות אחרות</span><span id="libraryArrow">▼</span>
                </div>
                <div id="otherRecipesContainer" style="display:none; margin-top:10px;"></div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header"><h3>תפריט המשלחת</h3><button class="btn btn-danger" onclick="clearPlan()">נקה</button></div>
            <div class="panel-content" id="plannerContainer"></div>
        </section>

        <section class="panel">
            <div class="panel-header"><h3>רשימת קניות</h3></div>
            <div class="panel-content" id="shoppingContainer"></div>
            <div style="padding: 15px; border-top: 1px solid #EDF2F7;"><button class="btn btn-success" onclick="copyToClipboard()">📲 העתק לוואטסאפ</button></div>
        </section>
    </main>
</div>

<div id="recipeModal" class="modal">
    <div class="modal-header">
        <h2 style="margin:0; color:var(--primary)">עורך מתכונים</h2>
        <button class="btn btn-secondary" onclick="closeRecipeModal()">סגור</button>
    </div>
    <div style="max-width:1100px; margin:0 auto;">
        <input type="text" id="mName" placeholder="שם המנה" style="width:100%; padding:15px; font-size:1.5rem; font-weight:800; border:2px solid var(--primary); border-radius:var(--radius-md); margin-bottom:25px;">
        <div id="modalIngs"></div>
        <button class="btn btn-secondary" onclick="addIngRow()" style="width:100%; margin-top:10px; border:2px dashed #CBD5E0; justify-content:center;">+ הוסף רכיב</button>
        <div style="margin-top:40px; display:flex; gap:15px;">
            <button class="btn btn-primary" onclick="saveRecipe()" style="flex:2; justify-content:center; padding:18px;">שמור למאגר</button>
            <button class="btn btn-secondary" onclick="closeRecipeModal()" style="flex:1; justify-content:center;">ביטול</button>
        </div>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-header"><h2>ניהול משתמשים</h2><button class="btn btn-secondary" onclick="closeAdminModal()">סגור</button></div>
    <div style="max-width:900px; margin:0 auto;">
        <div class="card" style="padding:25px; background:#f8fafc; margin-bottom:30px; display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:15px; align-items:flex-end;">
            <div><label style="font-size:12px; font-weight:bold;">ID</label><input type="text" id="newUsername" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></div>
            <div><label style="font-size:12px; font-weight:bold;">שם</label><input type="text" id="newName" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></div>
            <div><label style="font-size:12px; font-weight:bold;">מדינה</label><select id="newCountrySelect" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></select></div>
            <button class="btn btn-primary" id="adminActionBtn" onclick="addNewUser()">הוסף/שמור</button>
        </div>
        <table style="width:100%; border-collapse:collapse; text-align:right;">
            <thead><tr style="border-bottom:2px solid #eee;"><th style="padding:15px;">ID</th><th>שם</th><th>מדינה</th><th style="text-align:center">פעולות</th></tr></thead>
            <tbody id="usersTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Config & Lists
    const COUNTRIES = { "ישראל": "🇮🇱", "רומניה": "🇷🇴", "הונגריה": "🇭🇺", "דנמרק": "🇩🇰", "אנגליה": "🇬🇧", "שוויץ": "🇨🇭" };
    const DIETS = [{id: 'none', label: 'רגיל'}, {id: 'Vegan', label: 'טבעוני 🥬'}, {id: 'Vegetarian', label: 'צמחוני 🥦'}, {id: 'GF', label: 'גלוטן 🌾'}, {id: 'Lac', label: 'לקטוז 🥛'}];
    const UNITS = ["קג", "גרם", "ליטר", "מל", "יחידות", "חבילות", "ארגזים"];
    const CATEGORIES = ["ירקות ופירות", "מוצרים יבשים", "מאפיה", "מוצרי בשר", "מוצרי חלב", "תבלינים", "חטיפים ומתוקים", "ציוד מתכלה"];

    // App State
    let USERS = JSON.parse(localStorage.getItem('scoutUsers')) || {};
    USERS["admin"] = { name: "תומר", country: "ישראל", flag: "🇮🇱", role: "admin" }; // Ensure Tomer is always Admin
    
    let globalLibrary = JSON.parse(localStorage.getItem('globalScoutLibrary')) || {};
    let currentUser = null, userPlan = [], currentTotals = {}, editingUserId = null;

    // Login Flow
    function login() {
        const input = document.getElementById('usernameInput').value.toLowerCase().trim();
        if (USERS[input]) {
            currentUser = { ...USERS[input], id: input };
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'flex';
            document.getElementById('adminBtn').style.display = (currentUser.role === 'admin') ? 'inline-flex' : 'none';
            userPlan = JSON.parse(localStorage.getItem('plan_' + currentUser.id)) || [];
            document.getElementById('userDisplay').innerHTML = `${currentUser.name} ${currentUser.flag}`;
            renderLib(); calc();
        } else { alert("משתמש לא קיים"); }
    }

    function logout() { location.reload(); }

    // Library Controls
    function toggleOtherLibrary() {
        const container = document.getElementById('otherRecipesContainer');
        const arrow = document.getElementById('libraryArrow');
        const isHidden = container.style.display === 'none';
        container.style.display = isHidden ? 'block' : 'none';
        arrow.innerText = isHidden ? '▲' : '▼';
    }

    function renderLib() {
        let myCont = document.getElementById('myRecipesContainer'), otherCont = document.getElementById('otherRecipesContainer');
        myCont.innerHTML = ''; otherCont.innerHTML = '';
        let search = document.getElementById('libSearch').value.toLowerCase();

        for (let key in globalLibrary) {
            if (search && !key.toLowerCase().includes(search)) continue;
            let meal = globalLibrary[key], isMine = meal.creatorId === currentUser.id;
            let html = `
                <div class="card recipe-card ${isMine ? 'mine' : ''}" onclick="addToPlan('${key}')">
                    <div style="font-weight:800;">${key}</div>
                    <div class="card-meta">
                        <span class="tag">${meal.creatorName} ${meal.creatorFlag || ''}</span>
                        <div style="display:flex; gap:10px; font-size:18px;">
                            ${isMine ? `<span onclick="event.stopPropagation(); openRecipeModal('${key}')">✏️</span><span onclick="event.stopPropagation(); deleteFromLib('${key}')">❌</span>` : `<button class="tag" style="background:var(--primary-light); color:var(--primary); border:none; cursor:pointer" onclick="event.stopPropagation(); duplicateMeal('${key}')">הוסף למתכונים שלי</button>`}
                        </div>
                    </div>
                </div>`;
            isMine ? myCont.innerHTML += html : otherCont.innerHTML += html;
        }
    }

    // Engine Logic
    function calc() {
        const pax = { total: Math.max(0, parseInt(document.getElementById('paxTotal').value || 0)), Vegan: Math.max(0, parseInt(document.getElementById('paxVegan').value || 0)), Vegetarian: Math.max(0, parseInt(document.getElementById('paxVeg').value || 0)), GF: Math.max(0, parseInt(document.getElementById('paxGF').value || 0)), Lac: Math.max(0, parseInt(document.getElementById('paxLac').value || 0)) };
        currentTotals = {}; let plannerHTML = '';

        userPlan.forEach((mealName, idx) => {
            let meal = globalLibrary[mealName];
            if(meal) {
                let mHTML = '';
                meal.ings.forEach(ing => {
                    let mult = 0;
                    let rests = Array.isArray(ing.r) ? ing.r : [ing.r];
                    if (rests.includes('none')) { mult = pax.total; } else { rests.forEach(r => mult += (pax[r] || 0)); }
                    let rawAmt = (mult / 10) * ing.q, finalU = ing.u, finalAmt = rawAmt;
                    if (ing.u === "גרם") { finalAmt = rawAmt / 1000; finalU = "קג"; }
                    if (ing.u === "מל") { finalAmt = rawAmt / 1000; finalU = "ליטר"; }
                    mHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #eee; font-size:13px;"><span>${ing.n}</span><span style="font-weight:bold; color:var(--primary)">${finalAmt.toFixed(2)} ${finalU}</span></div>`;
                    if (!currentTotals[ing.c]) currentTotals[ing.c] = {};
                    let key = `${ing.n} (${finalU})`;
                    currentTotals[ing.c][key] = (currentTotals[ing.c][key] || 0) + finalAmt;
                });
                plannerHTML += `<div class="card" style="border-right:5px solid var(--accent); overflow:hidden;"><div class="meal-card-header">${mealName} <span onclick="removeFromPlan(${idx})" style="cursor:pointer">❌</span></div><div style="padding:15px;">${mHTML}</div></div>`;
            }
        });
        document.getElementById('plannerContainer').innerHTML = plannerHTML || '<div style="text-align:center; color:#ccc; margin-top:40px;">הוסיפו מתכונים</div>';
        
        let shopHTML = '';
        CATEGORIES.forEach(c => {
            if (currentTotals[c]) {
                shopHTML += `<div style="margin-bottom:20px;"><div style="font-weight:bold; color:var(--secondary); border-bottom:2px solid var(--primary-light); margin-bottom:8px; font-size:12px; text-transform:uppercase;">${c}</div>`;
                for (let k in currentTotals[c]) {
                    let u = k.split('(')[1].replace(')','');
                    shopHTML += `<div style="display:flex; justify-content:space-between; padding:6px 0;"><span>${k.split(' (')[0]}</span><span style="font-weight:bold; color:var(--primary)">${currentTotals[c][k].toFixed(2)} ${u}</span></div>`;
                }
                shopHTML += `</div>`;
            }
        });
        document.getElementById('shoppingContainer').innerHTML = shopHTML;
    }

    // Modal Operations
    function openRecipeModal(key=null) { 
        document.getElementById('mName').value = key || ""; document.getElementById('modalIngs').innerHTML = "";
        let ings = (key && globalLibrary[key]) ? globalLibrary[key].ings : [];
        ings.length ? ings.forEach(i => addIngRow(i)) : addIngRow();
        document.getElementById('recipeModal').style.display = 'block';
    }
    function closeRecipeModal() { document.getElementById('recipeModal').style.display = 'none'; }
    
    function handleDietClick(checkbox, row) {
        const checkboxes = row.querySelectorAll('input[type="checkbox"]');
        if (checkbox.value === 'none' && checkbox.checked) { checkboxes.forEach(cb => { if (cb.value !== 'none') cb.checked = false; }); } 
        else if (checkbox.checked) { checkboxes.forEach(cb => { if (cb.value === 'none') cb.checked = false; }); }
    }

    function addIngRow(d={n:"", q:0, u:"קג", c:"מוצרים יבשים", r:['none']}) {
        let div = document.createElement('div'); div.className = 'ing-row';
        let activeRests = Array.isArray(d.r) ? d.r : [d.r];
        let dietHTML = DIETS.map(diet => `<label class="diet-opt"><input type="checkbox" value="${diet.id}" ${activeRests.includes(diet.id) ? 'checked' : ''} onchange="handleDietClick(this, this.closest('.diet-multi'))">${diet.label}</label>`).join('');
        div.innerHTML = `<input type="text" class="i-name" value="${d.n}" placeholder="רכיב"><input type="number" class="i-qty" value="${d.q}" step="0.01">
            <select>${UNITS.map(u=>`<option ${d.u==u?'selected':''}>${u}</option>`).join('')}</select>
            <select>${CATEGORIES.map(c=>`<option ${d.c==c?'selected':''}>${c}</option>`).join('')}</select>
            <div class="diet-multi">${dietHTML}</div><button onclick="this.parentElement.remove()" style="font-size:20px; border:none; background:none; cursor:pointer;">❌</button>`;
        document.getElementById('modalIngs').appendChild(div);
    }

    function saveRecipe() {
        let n = document.getElementById('mName').value.trim(); if(!n) return alert("שם מנה חובה");
        globalLibrary[n] = { creatorId: currentUser.id, creatorName: currentUser.name, creatorFlag: currentUser.flag, ings: Array.from(document.querySelectorAll('.ing-row')).map(r=> {
                let s = r.querySelectorAll('select');
                let selectedDiets = Array.from(r.querySelectorAll('.diet-multi input:checked')).map(cb => cb.value);
                return { n: r.querySelector('.i-name').value, q: parseFloat(r.querySelector('.i-qty').value||0), u: s[0].value, c: s[1].value, r: selectedDiets.length ? selectedDiets : ['none'] };
            }).filter(i=>i.n!="") 
        };
        localStorage.setItem('globalScoutLibrary', JSON.stringify(globalLibrary)); renderLib(); calc(); closeRecipeModal();
    }

    function deleteFromLib(key) { if(confirm("למחוק מתכון?")) { delete globalLibrary[key]; localStorage.setItem('globalScoutLibrary', JSON.stringify(globalLibrary)); renderLib(); calc(); } }
    function duplicateMeal(key) { let nk=key+" (עותק)"; globalLibrary[nk]={...globalLibrary[key], creatorId:currentUser.id, creatorName:currentUser.name, creatorFlag:currentUser.flag}; localStorage.setItem('globalScoutLibrary', JSON.stringify(globalLibrary)); renderLib(); openRecipeModal(nk); }
    function addToPlan(key) { userPlan.push(key); localStorage.setItem('plan_' + currentUser.id, JSON.stringify(userPlan)); calc(); }
    function removeFromPlan(i) { userPlan.splice(i, 1); localStorage.setItem('plan_' + currentUser.id, JSON.stringify(userPlan)); calc(); }
    function clearPlan() { if(confirm("לנקות תפריט?")) { userPlan = []; localStorage.setItem('plan_' + currentUser.id, JSON.stringify(userPlan)); calc(); } }

    // Admin Tools
    function openAdminModal() { document.getElementById('newCountrySelect').innerHTML = Object.keys(COUNTRIES).map(c=>`<option value="${c}">${c}</option>`).join(''); renderUsersTable(); document.getElementById('adminModal').style.display='block'; }
    function closeAdminModal() { document.getElementById('adminModal').style.display='none'; }
    function addNewUser() {
        const id = document.getElementById('newUsername').value.toLowerCase().trim(), name = document.getElementById('newName').value, country = document.getElementById('newCountrySelect').value;
        if(!id || !name) return alert("מלא פרטים");
        if(editingUserId && editingUserId !== id) delete USERS[editingUserId];
        USERS[id] = { name, country, flag: COUNTRIES[country], role: id === 'admin' ? 'admin' : 'user' };
        localStorage.setItem('scoutUsers', JSON.stringify(USERS)); renderUsersTable();
    }
    function editUser(id) { const u = USERS[id]; document.getElementById('newUsername').value = id; document.getElementById('newName').value = u.name; document.getElementById('newCountrySelect').value = u.country; editingUserId = id; }
    function renderUsersTable() {
        const b = document.getElementById('usersTableBody'); b.innerHTML = "";
        for(let id in USERS) b.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:15px;">${id}</td><td>${USERS[id].name}</td><td>${USERS[id].country} ${USERS[id].flag}</td><td style="text-align:center;">${id !== 'admin' ? `<span onclick="editUser('${id}')" style="cursor:pointer; margin-left:15px;">✏️</span><span onclick="deleteUser('${id}')" style="cursor:pointer;">❌</span>` : '--'}</td></tr>`;
    }
    function deleteUser(id) { if(confirm("למחוק משתמש?")) { delete USERS[id]; localStorage.setItem('scoutUsers', JSON.stringify(USERS)); renderUsersTable(); } }

    function copyToClipboard() {
        let text = `🛒 *רשימת קניות המשלחת ל${currentUser.country} ${currentUser.flag}*\n----------------------------------------\n`;
        CATEGORIES.forEach(cat => { if (currentTotals[cat]) { text += `\n*${cat.toUpperCase()}*\n`; for (let item in currentTotals[cat]) { let u = item.split('(')[1].replace(')', ''), amt = currentTotals[cat][item].toFixed(2); text += `• ${item.split(' (')[0]}: ${amt} ${u}\n`; } } });
        navigator.clipboard.writeText(text).then(() => { let t = document.getElementById("toast"); t.style.visibility = "visible"; setTimeout(() => t.style.visibility = "hidden", 3000); });
    }
</script>
</body>
</html>
